services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      APP_ENV: local

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: history-db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      AUTH_ACCESS_SECRET: super-access-secret
      AUTH_REFRESH_SECRET: super-refresh-secret
      AUTH_ACCESS_TTL: 15m
      AUTH_REFRESH_TTL: 168h
      LOG_LEVEL: info
      CORS_ALLOWED_ORIGINS: http://localhost:*,http://127.0.0.1:*
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000/history-media
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: history-media
      S3_USE_SSL: "false"

      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_LOGIN: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin1234
    depends_on:
      - db
      - minio

  db:
    image: postgres:16
    container_name: history-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: history-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: history-app-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/history-media;
      mc anonymous set download local/history-media;
      "
volumes:
  postgres_data:
  minio_data:
