services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      APP_ENV: local

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: history-db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      AUTH_ACCESS_SECRET: super-access-secret
      AUTH_REFRESH_SECRET: super-refresh-secret
      AUTH_ACCESS_TTL: 15m
      AUTH_REFRESH_TTL: 168h
      LOG_LEVEL: info
      CORS_ALLOWED_ORIGINS: http://localhost:*,http://127.0.0.1:*

      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_LOGIN: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin1234
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: history-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: history-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
